<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="notesApp.css"></link>
    <body>
        <div id="app">
            <div id="searchContainer">
                <div id="searchWrapper">
                    <input type="text" id="searchBar" placeholder="Search...">
                    <button id="searchBtn">Search</button>
                    <div id="searchResults"></div>
                </div>
            </div>

        <div id="mainContent">

            <div id="sidebar">
                <button onclick="addNoteItem()" id="addNoteItem">+</button>
                <div id="notesList"></div>
            </div>

            <div id="dashboard">
                <h2>Saved Notes</h2>
                <div id="dashboard-items-container"></div>
            </div>

            <div id="searchPage" class="hidden"></div>

            <div id="content">
                <button id="deleteBtn">Delete</button>
                <input id="title" placeholder="Title">
                <div id="saveStatus">Saving..</div>
                <textarea id="editor" placeholder="Start typing here..."></textarea>
                
            </div>

        </div>
            <div id="deleteModal" class="hidden">
            <div id="deleteModalContent">
                <p>Do you want to delete this note?</p>

                <div id="modalButtons">
                    <button id="confirmDeleteBtn">Yes</button>
                    <button id="cancelDeleteBtn">No</button>
                </div>
            </div>
        </div>
        </div>
        
        
    
    

        <script src="notesApp.js"></script>
    </body>
</html>
